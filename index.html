<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>나의 PMS · 개인 업무 관리</title>
<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --panel2:#1e222e; --line:#272b38;
    --text:#e6e8ef; --muted:#8b90a3; --accent:#6c8cff; --accent2:#9b6cff;
    --good:#3ecf8e; --warn:#ffb454; --bad:#ff6b6b;
    --c-work:#6c8cff; --c-today:#ff6b6b; --c-personal:#3ecf8e;
    --c-growth:#ffb454; --c-schedule:#9b6cff;
    --radius:14px; --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Segoe UI","Malgun Gothic",-apple-system,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,#1b2030 0,var(--bg) 55%);
    color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1240px;margin:0 auto;padding:28px 22px 80px}

  /* Header */
  header{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap;margin-bottom:22px}
  .hello h1{font-size:24px;margin:0 0 4px;font-weight:700;letter-spacing:-.3px}
  .hello p{margin:0;color:var(--muted);font-size:14px}
  .clock{text-align:right}
  .clock .date{font-size:14px;color:var(--muted)}
  .clock .time{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.5px}

  /* Stat cards */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
  .stat .label{font-size:12px;color:var(--muted);margin-bottom:8px}
  .stat .num{font-size:28px;font-weight:700;line-height:1}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:6px}
  .bar{height:7px;border-radius:6px;background:var(--panel2);overflow:hidden;margin-top:10px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px;transition:width .4s}

  /* Board */
  .board{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;align-items:start}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);display:flex;flex-direction:column;min-height:120px;overflow:hidden}
  .col-head{display:flex;align-items:center;gap:9px;padding:13px 14px;border-bottom:1px solid var(--line)}
  .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .col-head .name{font-weight:600;font-size:14px;flex:1}
  .col-head .count{font-size:12px;color:var(--muted);background:var(--panel2);padding:2px 8px;border-radius:20px}
  .col-body{padding:10px;display:flex;flex-direction:column;gap:9px;flex:1}

  /* Task card */
  .task{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 11px 10px;position:relative;transition:.15s}
  .task:hover{border-color:#3a4055}
  .task.done{opacity:.5}
  .task.done .t-title{text-decoration:line-through;color:var(--muted)}
  .t-top{display:flex;gap:9px;align-items:flex-start}
  .chk{appearance:none;-webkit-appearance:none;width:18px;height:18px;border:2px solid var(--muted);border-radius:6px;cursor:pointer;flex:none;margin-top:1px;position:relative;transition:.15s}
  .chk:checked{background:var(--good);border-color:var(--good)}
  .chk:checked::after{content:"✓";position:absolute;color:#06231a;font-size:12px;font-weight:900;left:2px;top:-2px}
  .t-title{font-size:13.5px;line-height:1.4;flex:1;word-break:break-word}
  .t-note{font-size:12px;color:var(--muted);margin:6px 0 0 27px;line-height:1.45;white-space:pre-wrap}
  .t-meta{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 0 27px;align-items:center}
  .pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
  .pri-high{background:rgba(255,107,107,.16);color:#ff8e8e}
  .pri-mid{background:rgba(255,180,84,.16);color:#ffc777}
  .pri-low{background:rgba(62,207,142,.14);color:#5fe0a4}
  .due{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
  .due.overdue{color:#ff8e8e;font-weight:600}
  .due.today{color:#ffc777;font-weight:600}
  .del{position:absolute;top:8px;right:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;opacity:0;transition:.15s;padding:2px 4px;border-radius:6px}
  .task:hover .del{opacity:1}
  .del:hover{color:var(--bad);background:rgba(255,107,107,.12)}

  /* Add form */
  .add{padding:10px;border-top:1px solid var(--line)}
  .add input,.add textarea,.add select{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:8px 10px;font-size:13px;font-family:inherit;margin-bottom:7px}
  .add textarea{resize:vertical;min-height:34px}
  .add .row{display:flex;gap:7px}
  .add .row > *{margin-bottom:0}
  .add-btn{width:100%;border:none;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;font-weight:600;font-size:13px;padding:9px;border-radius:9px;cursor:pointer;margin-top:7px;transition:.15s}
  .add-btn:hover{filter:brightness(1.1)}
  .add-toggle{width:100%;border:1px dashed var(--line);background:transparent;color:var(--muted);padding:9px;border-radius:9px;cursor:pointer;font-size:13px;transition:.15s}
  .add-toggle:hover{border-color:var(--accent);color:var(--accent)}
  .add-form{display:none}
  .add-form.open{display:block}
  .empty{color:var(--muted);font-size:12.5px;text-align:center;padding:18px 8px;line-height:1.5}

  footer{margin-top:34px;text-align:center;color:var(--muted);font-size:12px}
  footer button{background:transparent;border:1px solid var(--line);color:var(--muted);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;margin:0 4px}
  footer button:hover{border-color:var(--bad);color:var(--bad)}

  @media(max-width:1000px){.board{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.board{grid-template-columns:1fr}.stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="hello">
      <h1 id="greet">안녕하세요 👋</h1>
      <p id="subtitle">오늘도 차근차근 정리해 볼까요?</p>
    </div>
    <div class="clock">
      <div class="date" id="date"></div>
      <div class="time" id="time"></div>
    </div>
  </header>

  <section class="stats">
    <div class="stat">
      <div class="label">전체 진행률</div>
      <div class="num"><span id="pct">0</span>%</div>
      <div class="bar"><i id="barFill" style="width:0%"></i></div>
      <div class="sub"><span id="doneCount">0</span> / <span id="totalCount">0</span> 완료</div>
    </div>
    <div class="stat">
      <div class="label">오늘 꼭 할 일</div>
      <div class="num" style="color:var(--c-today)" id="todayLeft">0</div>
      <div class="sub">남은 항목</div>
    </div>
    <div class="stat">
      <div class="label">기한 임박/초과</div>
      <div class="num" style="color:var(--warn)" id="dueSoon">0</div>
      <div class="sub">오늘까지 또는 지남</div>
    </div>
    <div class="stat">
      <div class="label">진행 중 업무</div>
      <div class="num" style="color:var(--good)" id="active">0</div>
      <div class="sub">미완료 전체</div>
    </div>
  </section>

  <div class="board" id="board"></div>

  <footer>
    <p id="saveStatus">저장 위치 확인 중…</p>
    <button onclick="exportData()">⬇ 백업 내보내기(JSON)</button>
    <button onclick="document.getElementById('importFile').click()">⬆ 백업 불러오기</button>
    <button onclick="resetAll()">전체 초기화</button>
    <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
  </footer>
</div>

<script>
const CATS = [
  {id:"work",     name:"회사 업무",      icon:"🏢", color:"var(--c-work)"},
  {id:"today",    name:"오늘 꼭 할 일",  icon:"🔥", color:"var(--c-today)"},
  {id:"personal", name:"개인 업무",      icon:"🏠", color:"var(--c-personal)"},
  {id:"growth",   name:"자기계발",       icon:"📚", color:"var(--c-growth)"},
  {id:"schedule", name:"개인 일정",      icon:"📅", color:"var(--c-schedule)"},
];
const KEY = "myPmsData_v1";
const API = "/api/data";
let tasks = [];
let useServer = false;   // true면 내 컴퓨터 파일(data.json)에 저장
let saveTimer = null;

function lsLoad(){
  try{ const d=JSON.parse(localStorage.getItem(KEY)); return Array.isArray(d)?d:null; }
  catch(e){ return null; }
}

// 서버(파일)가 있으면 파일에서, 없으면 브라우저에서 불러옴
async function loadTasks(){
  try{
    const r = await fetch(API,{cache:"no-store"});
    if(r.ok){
      useServer = true;
      const d = await r.json();
      if(Array.isArray(d) && d.length) return d;
      return lsLoad() || seed();   // 파일이 비었으면 기존 브라우저 데이터 or 예시
    }
  }catch(e){ /* 서버 없음 = 파일을 직접 연 경우 */ }
  useServer = false;
  return lsLoad() || seed();
}

function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(tasks)); }catch(e){}  // 항상 브라우저에도 백업
  if(useServer){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(()=>{
      fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(tasks)}).catch(()=>{});
    },120);
  }
  updateSaveStatus();
}

function updateSaveStatus(){
  const el=document.getElementById("saveStatus");
  if(el) el.textContent = useServer
    ? "💾 내 컴퓨터 파일에 자동 저장됨  ·  data.json"
    : "💾 이 브라우저에 자동 저장됨 (localStorage)";
}
function seed(){
  return [
    {id:uid(),cat:"work",title:"주간 업무 보고서 작성",note:"지난주 진행분 정리 + 이번주 계획",pri:"high",due:todayStr(),done:false},
    {id:uid(),cat:"today",title:"거래처 회신 메일 보내기",note:"",pri:"high",due:todayStr(),done:false},
    {id:uid(),cat:"personal",title:"공과금 납부",note:"",pri:"mid",due:"",done:false},
    {id:uid(),cat:"growth",title:"영어 회화 30분",note:"매일 꾸준히!",pri:"low",due:"",done:false},
    {id:uid(),cat:"schedule",title:"치과 예약",note:"오후 3시",pri:"mid",due:"",done:false},
  ];
}
function uid(){ return Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-3); }
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }

/* ---------- render ---------- */
function render(){
  const board = document.getElementById("board");
  board.innerHTML = "";
  CATS.forEach(cat=>{
    const list = tasks.filter(t=>t.cat===cat.id);
    const doneN = list.filter(t=>t.done).length;
    const col = document.createElement("div");
    col.className="col";
    col.innerHTML = `
      <div class="col-head">
        <span class="dot" style="background:${cat.color}"></span>
        <span class="name">${cat.icon} ${cat.name}</span>
        <span class="count">${doneN}/${list.length}</span>
      </div>
      <div class="col-body" id="body-${cat.id}"></div>
      <div class="add">
        <button class="add-toggle" onclick="toggleForm('${cat.id}')">+ 항목 추가</button>
        <div class="add-form" id="form-${cat.id}">
          <input type="text" id="ti-${cat.id}" placeholder="할 일 제목" onkeydown="if(event.key==='Enter'){event.preventDefault();addTask('${cat.id}')}">
          <textarea id="tn-${cat.id}" placeholder="메모 (선택)"></textarea>
          <div class="row">
            <select id="tp-${cat.id}">
              <option value="high">🔴 높음</option>
              <option value="mid" selected>🟡 보통</option>
              <option value="low">🟢 낮음</option>
            </select>
            <input type="date" id="td-${cat.id}">
          </div>
          <button class="add-btn" onclick="addTask('${cat.id}')">추가하기</button>
        </div>
      </div>`;
    board.appendChild(col);

    const body = col.querySelector(`#body-${cat.id}`);
    if(list.length===0){
      body.innerHTML = `<div class="empty">아직 항목이 없어요.<br>아래에서 추가해 보세요.</div>`;
    } else {
      // 미완료 먼저, 그 안에서 우선순위순
      const order={high:0,mid:1,low:2};
      list.sort((a,b)=> (a.done-b.done) || (order[a.pri]-order[b.pri]));
      list.forEach(t=> body.appendChild(taskEl(t)));
    }
  });
  updateStats();
  save();
}

function taskEl(t){
  const el=document.createElement("div");
  el.className="task"+(t.done?" done":"");
  const priMap={high:["pri-high","높음"],mid:["pri-mid","보통"],low:["pri-low","낮음"]};
  const [pcls,plabel]=priMap[t.pri]||priMap.mid;
  let dueHtml="";
  if(t.due){
    const cls=dueClass(t.due);
    dueHtml=`<span class="due ${cls}">📅 ${fmtDue(t.due)}${cls==="overdue"?" · 지남":cls==="today"?" · 오늘":""}</span>`;
  }
  el.innerHTML=`
    <button class="del" title="삭제" onclick="delTask('${t.id}')">✕</button>
    <div class="t-top">
      <input type="checkbox" class="chk" ${t.done?"checked":""} onchange="toggleDone('${t.id}')">
      <div class="t-title">${esc(t.title)}</div>
    </div>
    ${t.note?`<div class="t-note">${esc(t.note)}</div>`:""}
    <div class="t-meta">
      <span class="pill ${pcls}">${plabel}</span>
      ${dueHtml}
    </div>`;
  return el;
}

function dueClass(due){
  const today=todayStr();
  if(due<today) return "overdue";
  if(due===today) return "today";
  return "";
}
function fmtDue(due){
  const [y,m,d]=due.split("-");
  return `${Number(m)}/${Number(d)}`;
}

/* ---------- actions ---------- */
function toggleForm(cat){
  document.getElementById("form-"+cat).classList.toggle("open");
  const ti=document.getElementById("ti-"+cat); if(ti) ti.focus();
}
function addTask(cat){
  const ti=document.getElementById("ti-"+cat);
  const title=ti.value.trim();
  if(!title){ ti.focus(); return; }
  tasks.push({
    id:uid(), cat,
    title,
    note:document.getElementById("tn-"+cat).value.trim(),
    pri:document.getElementById("tp-"+cat).value,
    due:document.getElementById("td-"+cat).value,
    done:false
  });
  render();
  // 폼 유지 + 입력 초기화
  setTimeout(()=>{
    const f=document.getElementById("form-"+cat); if(f) f.classList.add("open");
    const n=document.getElementById("ti-"+cat); if(n) n.focus();
  },0);
}
function toggleDone(id){
  const t=tasks.find(x=>x.id===id); if(t){ t.done=!t.done; render(); }
}
function delTask(id){
  tasks=tasks.filter(x=>x.id!==id); render();
}

function updateStats(){
  const total=tasks.length;
  const done=tasks.filter(t=>t.done).length;
  const pct= total? Math.round(done/total*100):0;
  document.getElementById("pct").textContent=pct;
  document.getElementById("barFill").style.width=pct+"%";
  document.getElementById("doneCount").textContent=done;
  document.getElementById("totalCount").textContent=total;
  document.getElementById("todayLeft").textContent=tasks.filter(t=>t.cat==="today"&&!t.done).length;
  const today=todayStr();
  document.getElementById("dueSoon").textContent=tasks.filter(t=>!t.done&&t.due&&t.due<=today).length;
  document.getElementById("active").textContent=total-done;
}

/* ---------- backup ---------- */
function exportData(){
  const blob=new Blob([JSON.stringify(tasks,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="pms-backup-"+todayStr()+".json";
  a.click();
}
function importData(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(Array.isArray(d)){ tasks=d; render(); alert("불러오기 완료!"); } }catch(err){ alert("파일을 읽을 수 없습니다."); } };
  r.readAsText(file);
  e.target.value="";
}
function resetAll(){
  if(confirm("모든 항목을 삭제하고 처음 상태로 되돌릴까요?")){ tasks=[]; render(); }
}

function esc(s){ return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

/* ---------- clock & greeting ---------- */
function tick(){
  const d=new Date();
  const days=["일","월","화","수","목","금","토"];
  document.getElementById("date").textContent=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
  document.getElementById("time").textContent=d.toTimeString().slice(0,8);
  const h=d.getHours();
  let g="안녕하세요";
  if(h<6) g="늦은 시간이네요"; else if(h<12) g="좋은 아침이에요"; else if(h<18) g="좋은 오후예요"; else g="좋은 저녁이에요";
  document.getElementById("greet").textContent=g+" 👋";
}

tick(); setInterval(tick,1000);
(async ()=>{ tasks = await loadTasks(); render(); })();
</script>
</body>
</html>
